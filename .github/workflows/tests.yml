name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore RandomMemory.sln

      - name: Build
        run: dotnet build RandomMemory.sln --no-restore -c Release

      - name: Test
        run: dotnet test RandomMemory.sln --no-build -c Release
